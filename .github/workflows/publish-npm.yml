name: publish-npm

# Publishes the kijito-inbox-monitor npm SIGNPOST package on a version tag, using Trusted
# Publishing (OIDC). The npm package is not a real installer: it points users at the Python
# package on PyPI (see bin/cli.js). No NPM_TOKEN is stored; npm exchanges a short-lived
# workflow credential and attaches provenance automatically.
#
# Two requirements for the OIDC publish to fire:
#   1. npm CLI >= 11.5.1 (Node 22 bundles npm 10.x, so we `npm install -g npm@latest`).
#   2. setup-node must NOT write an auth-token .npmrc. If `registry-url` is set, setup-node
#      writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`; with no token that line is
#      an empty credential that makes npm use token auth and SKIP OIDC entirely (publish 404s,
#      and the run log shows no OIDC/trusted-publishing attempt at all). So we omit registry-url.
# The package's Trusted Publisher (repo + this workflow) is configured on npmjs.com.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write   # required for Trusted Publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # No registry-url on purpose: it makes setup-node write an empty-token .npmrc that
          # suppresses OIDC. npm defaults to registry.npmjs.org anyway.
      # npm OIDC Trusted Publishing needs the npm CLI >= 11.5.1; Node 22 bundles npm 10.x.
      - run: npm install -g npm@latest
      - run: npm --version
      # Zero runtime deps, so no `npm ci`. There is no postinstall hook (npm v12 disables
      # install lifecycle scripts by default, and that pattern is how the worm spreads).
      - run: npm publish --access public
