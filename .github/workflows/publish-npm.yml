name: publish-npm

# Publishes the kijito-inbox-monitor npm SIGNPOST package on a version tag, using Trusted
# Publishing (OIDC). The npm package is not a real installer: it points users at the Python
# package on PyPI (see bin/cli.js). No NPM_TOKEN is stored; npm exchanges a short-lived
# workflow credential and attaches provenance automatically.
#
# REQUIRED ONE-TIME SETUP on npmjs.com (without it, publish 404s with "you do not have
# permission"): npmjs.com -> kijito-inbox-monitor -> Settings -> Trusted Publisher ->
# add GitHub repo "KijitoAI/kijito-inbox-monitor" + workflow ".github/workflows/publish-npm.yml".
# Until that exact (repo, workflow) pair is registered, OIDC cannot mint a publish credential.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write   # required for Trusted Publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # npm OIDC Trusted Publishing needs the npm CLI >= 11.5.1; Node 22 still bundles npm 10.x,
      # which silently falls back to token auth (and 404s without one). Upgrade npm first.
      - run: npm install -g npm@latest
      - run: npm --version
      # Zero runtime deps, so no `npm ci`. There is no postinstall hook (npm v12 disables
      # install lifecycle scripts by default, and that pattern is how the worm spreads).
      - run: npm publish --access public
